<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ObsidianLink Desktop</title>
  <link rel="icon" href="data:,">
  <style>
    :root {
      --bg: #f7f9fc;
      --bg-2: #eef3fa;
      --panel: rgba(255, 255, 255, .82);
      --panel-solid: #ffffff;
      --panel-soft: #f8fafc;
      --line: #e3e8f0;
      --line-strong: #d3dbe8;
      --text: #111827;
      --muted: #667085;
      --faint: #98a2b3;
      --blue: #2563eb;
      --blue-soft: #eaf1ff;
      --green: #16a34a;
      --green-soft: #eaf8ef;
      --orange: #d97706;
      --orange-soft: #fff7ed;
      --red: #dc2626;
      --red-soft: #fff1f2;
      --violet: #6d5dfc;
      --violet-soft: #f1efff;
      --shadow: 0 20px 50px rgba(38, 52, 77, .10);
      --shadow-soft: 0 12px 34px rgba(38, 52, 77, .07);
      --radius: 18px;
      --radius-sm: 12px;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      color: var(--text);
      background:
        radial-gradient(circle at 18% 8%, rgba(37, 99, 235, .10), transparent 28%),
        radial-gradient(circle at 88% 12%, rgba(22, 163, 74, .08), transparent 26%),
        linear-gradient(145deg, #ffffff 0%, var(--bg) 46%, var(--bg-2) 100%);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "PingFang SC", "Segoe UI", sans-serif;
      overflow: hidden;
      letter-spacing: 0;
    }

    button, input, textarea, select { font: inherit; }
    button { cursor: pointer; }
    button:disabled { cursor: not-allowed; opacity: .52; }
    input, textarea, select {
      width: 100%;
      border: 1px solid var(--line-strong);
      border-radius: 12px;
      background: rgba(255, 255, 255, .88);
      color: var(--text);
      outline: 0;
      padding: 11px 12px;
      transition: border-color .16s ease, box-shadow .16s ease, background .16s ease;
    }
    textarea { min-height: 118px; line-height: 1.55; resize: vertical; }
    input:focus, textarea:focus, select:focus {
      border-color: rgba(37, 99, 235, .58);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .10);
      background: #fff;
    }
    a { color: var(--blue); text-decoration: none; }

    .app-window {
      width: 100vw;
      height: 100vh;
      display: grid;
      grid-template-columns: 268px minmax(0, 1fr);
      overflow: hidden;
    }

    .sidebar {
      min-width: 0;
      border-right: 1px solid rgba(211, 219, 232, .82);
      background: rgba(250, 252, 255, .72);
      backdrop-filter: blur(26px);
      display: flex;
      flex-direction: column;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 24px 20px 26px;
    }
    .brand-logo {
      width: 42px;
      height: 42px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      color: #fff;
      font-weight: 900;
      background: linear-gradient(145deg, #4776ff 0%, #6d5dfc 52%, #58c083 100%);
      box-shadow: 0 14px 28px rgba(37, 99, 235, .25);
    }
    .brand-title { font-size: 17px; font-weight: 800; line-height: 1.1; }
    .brand-subtitle { margin-top: 4px; color: var(--muted); font-size: 12px; }

    .nav {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 0 14px;
    }
    .nav-button {
      width: 100%;
      height: 50px;
      border: 0;
      border-radius: 14px;
      background: transparent;
      color: #263242;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 14px;
      text-align: left;
      font-size: 15px;
    }
    .nav-button svg {
      width: 20px;
      height: 20px;
      color: #687386;
      flex: 0 0 auto;
    }
    .nav-button:hover { background: rgba(232, 238, 248, .72); }
    .nav-button.active {
      background: linear-gradient(135deg, #eaf1ff, #f7fbff);
      color: var(--blue);
      font-weight: 750;
      box-shadow: inset 0 0 0 1px rgba(37, 99, 235, .08);
    }
    .nav-button.active svg { color: var(--blue); }

    .sidebar-bottom {
      margin-top: auto;
      padding: 18px;
    }
    .mini-status {
      border: 1px solid var(--line);
      border-radius: 16px;
      background: rgba(255, 255, 255, .72);
      padding: 14px;
      box-shadow: var(--shadow-soft);
    }
    .mini-status-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      font-size: 13px;
      color: var(--muted);
    }

    .main {
      min-width: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .topbar {
      height: 78px;
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding: 0 28px;
      border-bottom: 1px solid rgba(227, 232, 240, .78);
      background: rgba(255, 255, 255, .68);
      backdrop-filter: blur(24px);
    }
    .title-block { min-width: 0; display: flex; align-items: center; gap: 14px; }
    .title-icon {
      width: 44px;
      height: 44px;
      border-radius: 15px;
      display: grid;
      place-items: center;
      color: #fff;
      background: linear-gradient(145deg, #2f6df6, #59bb82);
      box-shadow: 0 13px 26px rgba(37, 99, 235, .20);
    }
    .page-title { margin: 0; font-size: 22px; line-height: 1.15; font-weight: 850; letter-spacing: 0; }
    .page-subtitle {
      margin-top: 4px;
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 720px;
    }
    .top-actions { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; justify-content: flex-end; }

    .content {
      min-height: 0;
      flex: 1;
      overflow: auto;
      padding: 24px 28px 28px;
    }

    .bottom-bar {
      height: 42px;
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      gap: 18px;
      padding: 0 28px;
      border-top: 1px solid rgba(227, 232, 240, .78);
      background: rgba(255, 255, 255, .70);
      color: var(--muted);
      font-size: 12px;
      overflow: hidden;
    }
    .bottom-bar span {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 42vw;
    }

    .grid { display: grid; gap: 14px; }
    .grid-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .grid-3 { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .grid-4 { grid-template-columns: repeat(4, minmax(0, 1fr)); }
    .layout-home { display: grid; grid-template-columns: minmax(0, 1fr) 372px; gap: 14px; align-items: start; }
    .layout-wide { display: grid; grid-template-columns: minmax(0, 1.15fr) minmax(340px, .85fr); gap: 14px; align-items: start; }
    .layout-three { display: grid; grid-template-columns: 320px minmax(0, 1fr) 360px; gap: 14px; align-items: start; }

    .card {
      border: 1px solid rgba(211, 219, 232, .86);
      border-radius: var(--radius);
      background: var(--panel);
      box-shadow: var(--shadow-soft);
      overflow: hidden;
    }
    .card.pad { padding: 18px; }
    .card-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 14px;
      padding: 18px 18px 12px;
      border-bottom: 1px solid rgba(227, 232, 240, .76);
    }
    .card-title { margin: 0; font-size: 16px; font-weight: 800; letter-spacing: 0; }
    .card-desc { margin: 5px 0 0; color: var(--muted); font-size: 13px; line-height: 1.5; }
    .card-body { padding: 18px; }
    .metric-card {
      position: relative;
      min-height: 156px;
      padding: 18px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
    .metric-icon {
      width: 44px;
      height: 44px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      background: var(--blue-soft);
      color: var(--blue);
    }
    .metric-icon.green { background: var(--green-soft); color: var(--green); }
    .metric-icon.orange { background: var(--orange-soft); color: var(--orange); }
    .metric-icon.violet { background: var(--violet-soft); color: var(--violet); }
    .metric-title { margin: 12px 0 4px; font-size: 18px; font-weight: 850; }
    .metric-sub { color: var(--muted); font-size: 13px; line-height: 1.45; }
    .metric-check {
      position: absolute;
      top: 18px;
      right: 18px;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      border: 1px solid rgba(22, 163, 74, .36);
      color: var(--green);
      background: rgba(255, 255, 255, .82);
      font-size: 17px;
      font-weight: 800;
    }
    .metric-check.bad { border-color: rgba(220, 38, 38, .28); color: var(--red); }
    .metric-check.warn { border-color: rgba(217, 119, 6, .28); color: var(--orange); }

    .btn {
      min-height: 38px;
      border: 1px solid var(--line-strong);
      border-radius: 12px;
      background: rgba(255, 255, 255, .86);
      color: var(--text);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 8px 13px;
      font-weight: 650;
      box-shadow: 0 5px 14px rgba(38, 52, 77, .05);
    }
    .btn:hover { background: #fff; border-color: #cbd5e1; }
    .btn.primary {
      border-color: rgba(37, 99, 235, .14);
      background: linear-gradient(135deg, #2f6df6, #2563eb);
      color: #fff;
      box-shadow: 0 12px 22px rgba(37, 99, 235, .22);
    }
    .btn.green {
      border-color: rgba(22, 163, 74, .16);
      background: linear-gradient(135deg, #25b866, #16a34a);
      color: #fff;
    }
    .btn.ghost {
      background: transparent;
      box-shadow: none;
    }
    .btn.danger { color: var(--red); border-color: rgba(220, 38, 38, .25); background: var(--red-soft); }
    .btn.small { min-height: 32px; padding: 6px 10px; border-radius: 10px; font-size: 12px; }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 26px;
      padding: 4px 9px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, .82);
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }
    .pill.ok { color: #087b36; border-color: rgba(22, 163, 74, .20); background: var(--green-soft); }
    .pill.warn { color: #9a5a00; border-color: rgba(217, 119, 6, .20); background: var(--orange-soft); }
    .pill.bad { color: #b42318; border-color: rgba(220, 38, 38, .20); background: var(--red-soft); }
    .pill.blue { color: #1d4ed8; border-color: rgba(37, 99, 235, .20); background: var(--blue-soft); }

    .dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--faint);
      display: inline-block;
      flex: 0 0 auto;
    }
    .dot.ok { background: var(--green); }
    .dot.warn { background: var(--orange); }
    .dot.bad { background: var(--red); }
    .dot.run { background: var(--blue); box-shadow: 0 0 0 5px rgba(37, 99, 235, .12); }

    .progress {
      padding: 18px;
    }
    .progress-line {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 8px;
      position: relative;
    }
    .step {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 7px;
      color: var(--muted);
      text-align: center;
      font-size: 12px;
    }
    .step-badge {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: #edf2f7;
      color: #475467;
      font-weight: 800;
      box-shadow: 0 0 0 7px rgba(255, 255, 255, .9);
      z-index: 1;
    }
    .step.done .step-badge { background: var(--green); color: #fff; }
    .step.active .step-badge { background: var(--blue); color: #fff; }
    .step-title { font-weight: 750; color: #273142; }
    .step-sub { color: var(--faint); }

    .table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    .table th {
      text-align: left;
      color: var(--muted);
      font-weight: 700;
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
    }
    .table td {
      padding: 12px;
      border-bottom: 1px solid rgba(227, 232, 240, .72);
      vertical-align: top;
    }
    .table tr:last-child td { border-bottom: 0; }
    .table tr.selectable { cursor: pointer; }
    .table tr.selectable:hover { background: rgba(234, 241, 255, .42); }

    .chat-panel {
      min-height: 568px;
      display: flex;
      flex-direction: column;
    }
    .assistant-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 374px;
      gap: 24px;
      align-items: start;
      max-width: 1220px;
      margin: 0 auto;
    }
    .assistant-hero {
      padding-top: 22px;
      text-align: center;
    }
    .assistant-hero h2 {
      margin: 0;
      font-size: 34px;
      line-height: 1.15;
      letter-spacing: 0;
    }
    .assistant-hero p {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 15px;
    }
    .big-composer {
      margin-top: 34px;
      border: 1px solid rgba(37, 99, 235, .26);
      border-radius: 18px;
      background: rgba(255, 255, 255, .86);
      box-shadow: 0 18px 48px rgba(37, 99, 235, .10);
      padding: 16px;
    }
    .big-composer textarea {
      min-height: 116px;
      border: 0;
      box-shadow: none;
      background: transparent;
      font-size: 16px;
      padding: 8px;
    }
    .big-composer textarea:focus { box-shadow: none; }
    .conversation-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 22px;
    }
    .simple-message {
      display: grid;
      grid-template-columns: 36px minmax(0, 1fr) auto;
      align-items: center;
      gap: 12px;
      min-height: 44px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(255, 255, 255, .78);
      padding: 8px 12px;
      box-shadow: 0 8px 20px rgba(38, 52, 77, .04);
      text-align: left;
    }
    .simple-message.user { background: linear-gradient(135deg, #edf4ff, #f8fbff); }
    .pending-column {
      position: sticky;
      top: 0;
      min-height: calc(100vh - 132px);
    }
    .preview-card {
      border: 1px solid rgba(211, 219, 232, .92);
      border-radius: 18px;
      background: #fff;
      padding: 16px;
      box-shadow: var(--shadow-soft);
      display: grid;
      gap: 12px;
    }
    .preview-card.active {
      border-color: rgba(37, 99, 235, .36);
      box-shadow: 0 12px 32px rgba(37, 99, 235, .10);
    }
    .preview-top {
      display: grid;
      grid-template-columns: 44px minmax(0, 1fr) auto;
      gap: 12px;
      align-items: start;
    }
    .preview-top.with-check {
      grid-template-columns: 22px 44px minmax(0, 1fr) auto;
    }
    .preview-check {
      width: 22px;
      height: 44px;
      display: grid;
      place-items: center;
    }
    .preview-check input {
      width: 17px;
      height: 17px;
      padding: 0;
      margin: 0;
      accent-color: var(--blue);
      box-shadow: none;
    }
    .preview-logo {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: #111827;
      color: #fff;
      font-weight: 850;
    }
    .preview-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }
    .recent-panel {
      margin-top: 26px;
      text-align: left;
    }
    .recent-row {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 12px;
      align-items: center;
      padding: 11px 0;
      border-bottom: 1px solid rgba(227, 232, 240, .72);
    }
    .recent-row:last-child { border-bottom: 0; }
    .chat-stream {
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 18px;
      flex: 1;
      min-height: 320px;
    }
    .bubble-row { display: flex; align-items: flex-end; gap: 10px; }
    .bubble-row.user { justify-content: flex-end; }
    .avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: linear-gradient(145deg, #dfe7f4, #fff);
      border: 1px solid var(--line);
      display: grid;
      place-items: center;
      font-weight: 800;
      color: #596275;
      flex: 0 0 auto;
    }
    .bubble {
      max-width: 78%;
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 10px 12px;
      background: #fff;
      color: #283244;
      font-size: 14px;
      line-height: 1.45;
      box-shadow: 0 8px 18px rgba(38, 52, 77, .05);
      white-space: pre-wrap;
    }
    .bubble.user {
      background: linear-gradient(135deg, #edf4ff, #dfeaff);
      border-color: rgba(37, 99, 235, .18);
    }
    .composer {
      padding: 14px;
      border-top: 1px solid var(--line);
      background: rgba(248, 250, 252, .80);
    }
    .composer textarea { min-height: 86px; }
    .composer-actions { display: flex; justify-content: space-between; gap: 10px; margin-top: 10px; align-items: center; }

    .form-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 14px; }
    .field { display: flex; flex-direction: column; gap: 7px; min-width: 0; }
    .field label { color: #344054; font-weight: 720; font-size: 13px; }
    .help { color: var(--muted); font-size: 12px; line-height: 1.45; }
    .toolbar { display: flex; align-items: center; gap: 9px; flex-wrap: wrap; }
    .split { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .muted { color: var(--muted); }
    .faint { color: var(--faint); }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    .truncate { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .empty {
      border: 1px dashed var(--line-strong);
      border-radius: 14px;
      padding: 20px;
      color: var(--muted);
      background: rgba(255, 255, 255, .52);
      text-align: center;
      line-height: 1.55;
    }

    .list { display: flex; flex-direction: column; gap: 10px; }
    .list-item {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px;
      background: rgba(255, 255, 255, .70);
      display: grid;
      gap: 8px;
    }
    .list-item.selectable { cursor: pointer; }
    .list-item.selectable:hover, .list-item.active {
      border-color: rgba(37, 99, 235, .35);
      background: rgba(234, 241, 255, .62);
    }

    .timeline { display: flex; flex-direction: column; gap: 10px; }
    .timeline-row {
      display: grid;
      grid-template-columns: 18px minmax(0, 1fr);
      gap: 10px;
      align-items: start;
    }
    .timeline-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      margin-top: 7px;
      background: var(--faint);
    }
    .timeline-dot.success { background: var(--green); }
    .timeline-dot.failed { background: var(--red); }
    .timeline-dot.running { background: var(--blue); box-shadow: 0 0 0 5px rgba(37, 99, 235, .10); }
    .timeline-dot.warning { background: var(--orange); }

    .codebox {
      max-height: 360px;
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(248, 250, 252, .86);
      padding: 12px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px;
      line-height: 1.55;
      white-space: pre-wrap;
      color: #263242;
    }

    .tree {
      max-height: 520px;
      overflow: auto;
      display: flex;
      flex-direction: column;
      gap: 5px;
      font-size: 13px;
    }
    .tree-row {
      display: flex;
      gap: 8px;
      align-items: center;
      padding: 7px 9px;
      border-radius: 10px;
      color: #344054;
    }
    .tree-row:hover { background: rgba(234, 241, 255, .45); }

    .toast {
      position: fixed;
      right: 24px;
      bottom: 56px;
      z-index: 50;
      max-width: 420px;
      border: 1px solid rgba(211, 219, 232, .90);
      border-radius: 15px;
      background: rgba(255, 255, 255, .92);
      backdrop-filter: blur(18px);
      padding: 12px 14px;
      box-shadow: var(--shadow);
      color: #273142;
      font-size: 13px;
      display: none;
      line-height: 1.45;
    }
    .toast.show { display: block; }

    @media (max-width: 1180px) {
      .layout-home, .layout-wide, .layout-three, .assistant-grid { grid-template-columns: 1fr; }
      .pending-column { position: static; min-height: 0; }
      .grid-3, .grid-4 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .page-subtitle { max-width: 52vw; }
    }
    @media (max-width: 820px) {
      .app-window { grid-template-columns: 1fr; }
      .sidebar { display: none; }
      .content { padding: 18px; }
      .topbar { height: auto; min-height: 72px; align-items: flex-start; padding: 16px; flex-direction: column; }
